# Regla de alarma aprovisionada como código (Grafana Alerting).
# - Query A (Prometheus): % CPU del contenedor lab-backend
# - B: Reduce (Last)  ·  C: Threshold IS ABOVE 50  -> condición de la alerta
# - Evaluación cada 10s; pending period (for) de 30s
apiVersion: 1

groups:
  - orgId: 1
    name: cpu-alerts
    folder: Observabilidad
    interval: 10s
    rules:
      - uid: cpu-backend-50
        title: CPU backend > 50%
        condition: C
        for: 30s
        isPaused: false
        labels:
          severity: warning
        annotations:
          summary: 'El contenedor lab-backend supera el 50% de CPU'
          description: 'Uso de CPU del backend sostenido por encima del umbral de 50% durante 30s.'
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: sum(rate(container_cpu_usage_seconds_total{name="lab-backend"}[1m])) * 100
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              reducer: last
              expression: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 50
